services:
  app:
    build:
      context: .
    image: serpntbff:latest
    container_name: serpntbff_app
    restart: unless-stopped
    network_mode: host
    environment:
      SERVER_PORT: 8082
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_REDIRECT_URI: ${KEYCLOAK_REDIRECT_URI}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI}
      MAIN_URI: ${MAIN_URI}
      BACKEND_API_DOMAIN: ${BACKEND_API_DOMAIN:-http://127.0.0.1:8081}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:3000,https://serpnt.azotix.dev,https://*.netlify.app}
      SERVER_SERVLET_SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-.azotix.dev}
